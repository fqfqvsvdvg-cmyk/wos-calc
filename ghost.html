<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ぷてぃ研の連撃計算機</title>

<!-- OGP -->
<meta property="og:title" content="ぷてぃ研の連撃計算機">
<meta property="og:description" content="連撃の同時着弾タイミングを簡単計算🐶">
<meta property="og:type" content="website">
<meta property="og:url" content="https://fqfqvsvdvg-cmyk.github.io/wos-calc/ghost.html">
<meta property="og:image" content="https://fqfqvsvdvg-cmyk.github.io/wos-calc/IMG_0387.jpeg">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="ぷてぃ研の連撃計算機">
<meta name="twitter:description" content="連撃の同時着弾タイミングを簡単計算🐶">
<meta name="twitter:image" content="https://fqfqvsvdvg-cmyk.github.io/wos-calc/IMG_0387.jpeg">

<style>
body{
  font-family:-apple-system;
  background:#f5f5f7;
  margin:0;
  padding:16px;
}
h1{
  text-align:center;
}
.card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:16px;
}
.row{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.line{
  display:flex;
  gap:6px;
  align-items:center;
}
input{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}
.name{flex:1;}
.sec{width:70px;text-align:center;}
.timeMin{width:80px;text-align:center;}

.btn{
  background:#007aff;
  color:#fff;
  padding:12px;
  border-radius:10px;
  text-align:center;
  margin-top:10px;
}

.red{background:#ff3b30;}
.gray{background:#ddd;color:#000;}

.result{
  background:#f1f1f4;
  padding:12px;
  border-radius:10px;
  white-space:pre-wrap;
}

button{
  border:none;
  border-radius:8px;
  padding:8px 10px;
}

.active{
  background:#007aff;
  color:#fff;
}
</style>
</head>

<body>

<h1>🐶ぷてぃ研の連撃計算機🐶</h1>

<!-- ===== メイン集結 ===== -->
<div class="card">
<div><b>メイン集結</b></div>

<div id="mainList"></div>

<div class="btn gray" onclick="addRow('main')">集結主を追加するワン</div>

<br>
<div>基準時間（例 21:00）</div>

<div class="line">
<button onclick="setHour('main',21)">21</button>
<button onclick="setHour('main',22)">22</button>
<button onclick="setHour('main',23)">23</button>
<button onclick="setHour('main',24)">24</button>
<button onclick="setHour('main',1)">1</button>
<input id="mainMin" class="timeMin" placeholder="分">
</div>

<div>スタート秒</div>
<div class="line">
<button onclick="setStart('main',0)">0秒</button>
<button onclick="setStart('main',30)">30秒</button>
</div>

<div class="btn" onclick="calc('main')">計算&コピーするワン</div>

<div id="mainResult" class="result">ここに計算結果が出るワン</div>
</div>

<!-- ===== ゴースト集結 ===== -->
<div class="card">
<div><b>ゴースト集結</b></div>

<div id="ghostList"></div>

<div class="btn gray" onclick="addRow('ghost')">集結主を追加するワン</div>

<br>
<div>基準時間（例 21:00）</div>

<div class="line">
<button onclick="setHour('ghost',21)">21</button>
<button onclick="setHour('ghost',22)">22</button>
<button onclick="setHour('ghost',23)">23</button>
<button onclick="setHour('ghost',24)">24</button>
<button onclick="setHour('ghost',1)">1</button>
<input id="ghostMin" class="timeMin" placeholder="分">
</div>

<div>スタート秒</div>
<div class="line">
<button onclick="setStart('ghost',0)">0秒</button>
<button onclick="setStart('ghost',30)">30秒</button>
</div>

<div class="btn red" onclick="calc('ghost')">計算&コピーするワン</div>

<div id="ghostResult" class="result">ここに計算結果が出るワン</div>
</div>

<script>
let data={
  main:{hour:null,start:0},
  ghost:{hour:null,start:0}
};

function addRow(type){
  let div=document.createElement("div");
  div.className="line";
  div.innerHTML=`
    <input class="name" placeholder="名前">
    <input class="sec" placeholder="秒">
    <button onclick="this.parentNode.remove()">❌</button>
  `;
  document.getElementById(type+"List").appendChild(div);
}

function setHour(type,h){
  data[type].hour=h;
}

function setStart(type,s){
  data[type].start=s;
}

function calc(type){
  let hour=data[type].hour;
  let min=document.getElementById(type+"Min").value;

  if(hour===null || min===""){
    alert("基準時間を入力してワン");
    return;
  }

  let rows=document.querySelectorAll("#"+type+"List .line");
  let times=[];

  rows.forEach(r=>{
    let name=r.children[0].value||"誰か";
    let sec=parseInt(r.children[1].value);

    if(!isNaN(sec)){
      times.push({name,sec});
    }
  });

  if(times.length===0)return;

  let max=Math.max(...times.map(t=>t.sec));

  let result="";

  times.forEach(t=>{
    let diff=max-t.sec;
    let startSec=data[type].start-diff;

    let h=hour;
    let m=parseInt(min);
    let s=startSec;

    while(s<0){
      s+=60;
      m--;
    }
    while(m<0){
      m+=60;
      h--;
    }

    result+=`${t.name} ${h}:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}\n`;
  });

  navigator.clipboard.writeText(result);

  document.getElementById(type+"Result").innerText=result+"\nコピーしたワン！";
}

// 初期1行
addRow("main");
addRow("ghost");
</script>

</body>
</html>
