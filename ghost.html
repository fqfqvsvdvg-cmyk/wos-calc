<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🐶連撃 同時着弾計算機🐶</title>

<style>
body{font-family:-apple-system;background:#f5f5f7;margin:0;padding:16px;}
h1{text-align:center;font-size:22px;margin-bottom:16px;}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:14px;}
.row{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.line{display:flex;gap:6px;align-items:center;}
input,select{padding:10px;border-radius:10px;border:1px solid #ddd;}
.name{flex:1;}
.sec{width:70px;text-align:center;}
.btn{padding:6px;border-radius:8px;border:none;background:#e9e9ed;flex:1;color:#007aff;}
.btn.active{background:#007aff;color:#fff;font-weight:bold;}
.delete{color:#ff3b30;width:40px;}
.drag{cursor:grab;font-size:18px;}
button.main{width:100%;padding:12px;border-radius:12px;border:none;background:#007aff;color:#fff;font-weight:bold;}
.add{background:#e9e9ed;color:#007aff;width:100%;padding:12px;border-radius:12px;border:none;font-weight:bold;}
.result{background:#f1f1f4;padding:12px;border-radius:10px;white-space:pre-wrap;}

#toast{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
  background:#333;color:#fff;padding:10px 16px;border-radius:20px;
  opacity:0;transition:0.3s;pointer-events:none;z-index:999;
}
</style>
</head>

<body>

<h1>🐶連撃 同時着弾計算機🐶</h1>

<div class="card" id="list"></div>

<button class="add" onclick="addRow()">集結主を追加するワン</button>

<div class="card">
  基準時間
  <input id="baseTime" placeholder="例 21:00">
</div>

<div class="card">
  スタート秒
  <select id="startSecond">
    <option value="0">00秒</option>
    <option value="30">30秒</option>
  </select>
</div>

<div class="card">
  <button class="main" onclick="calc()">計算&コピーするワン</button>
</div>

<div class="card">
  <div class="result" id="result">ここに計算結果が出るワン</div>
</div>

<div id="toast">コピーしたワン！</div>

<script>
let dragSrc=null;

function addRow(){
  const id=Date.now()+Math.random();

  const el=document.createElement("div");
  el.className="row";
  el.id=id;
  el.draggable=true;

  el.ondragstart=e=>dragSrc=el;
  el.ondragover=e=>e.preventDefault();
  el.ondrop=e=>{
    e.preventDefault();
    if(dragSrc!==el){
      el.parentNode.insertBefore(dragSrc,el);
    }
  };

  el.innerHTML=`
    <div class="line">
      <span class="drag">≡</span>
      <input class="name" placeholder="名前" id="n${id}">
      <input class="sec" id="s${id}" value="36">
      <button class="btn delete" onclick="removeRow(${id})">✕</button>
    </div>

    <div class="line">
      <button class="btn secbtn" onclick="setSec(${id},30,this)">30</button>
      <button class="btn secbtn" onclick="setSec(${id},32,this)">32</button>
      <button class="btn secbtn active" onclick="setSec(${id},36,this)">36</button>
      <button class="btn secbtn" onclick="setSec(${id},39,this)">39</button>
      <button class="btn secbtn" onclick="setSec(${id},43,this)">43</button>
    </div>
  `;

  document.getElementById("list").appendChild(el);
}

function setSec(id,val,btn){
  document.getElementById("s"+id).value=val;
  const row=document.getElementById(id);
  row.querySelectorAll(".secbtn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function removeRow(id){
  document.getElementById(id).remove();
}

function pad(n){return String(n).padStart(2,'0')}

function showToast(){
  const t=document.getElementById("toast");
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1500);
}

function calc(){
  const baseInput=document.getElementById("baseTime").value.trim();

  if(!baseInput){
    alert("基準時間を入力してワン");
    return;
  }

  const [h,m]=baseInput.split(":").map(Number);
  const startSec=parseInt(document.getElementById("startSecond").value);

  if(isNaN(h)||isNaN(m)){
    alert("21:00 の形式で入力してワン");
    return;
  }

  let members=[];

  document.querySelectorAll(".row").forEach(row=>{
    const id=row.id;
    let name=document.getElementById("n"+id).value || "誰か";
    let sec=parseInt(document.getElementById("s"+id).value);

    if(isNaN(sec)) return;

    members.push({name,sec});
  });

  if(members.length===0){
    document.getElementById("result").textContent="集結主を追加してワン";
    return;
  }

  const maxSec=Math.max(...members.map(x=>x.sec));

  let baseTotal=h*3600+m*60+startSec;

  let out=members.map(x=>{
    const offset=maxSec-x.sec;
    const sendTotal=baseTotal+offset;

    const hh=Math.floor(sendTotal/3600)%24;
    const mm=Math.floor((sendTotal%3600)/60);
    const ss=sendTotal%60;

    return {
      text:`${x.name}(${x.sec}秒) → ${pad(hh)}:${pad(mm)}:${pad(ss)}`,
      time:sendTotal
    };
  });

  out.sort((a,b)=>a.time-b.time);

  let text=out.map(x=>x.text).join("\n");

  document.getElementById("result").textContent=text;
  navigator.clipboard.writeText(text);
  showToast();
}

addRow();
</script>

</body>
</html>
