<style>
body{font-family:-apple-system;background:#f5f5f7;margin:0;padding:16px;}
h1{text-align:center;font-size:22px;margin-bottom:16px;}
.tabs{display:flex;gap:6px;margin-bottom:16px;}
.tab{flex:1;padding:12px;border:none;border-radius:12px;background:#e9e9ed;font-weight:bold;color:#555;}
.tab.active{background:#007aff;color:#fff;}
.mode{display:none;}
.mode.active{display:block;}
.section{background:#fff;border-radius:14px;padding:14px;margin-bottom:16px;}
.title{font-weight:bold;margin-bottom:10px;font-size:20px;}
.line{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.wrap{flex-wrap:wrap;}
input{padding:10px;border-radius:10px;border:1px solid #ccc;box-sizing:border-box;}
.error{border:2px solid #ff3b30!important;background:#fff0f0;}
.name{flex:1;min-width:0;}
.sec{width:80px;text-align:center;}
.timeMin{width:90px;text-align:center;}
.btn{padding:12px;border-radius:10px;color:#fff;border:none;font-weight:bold;text-align:center;}
.utcBtn{background:#555!important;}
.add{width:100%;margin-bottom:10px;}
.result{background:#f1f1f4;padding:12px;border-radius:10px;white-space:pre-wrap;font-weight:bold;}
.delete{color:red;border:none;border-radius:10px;padding:10px 16px;}

.blue .btn{background:#007aff;}
.blue .title{color:#007aff;}
.red .btn{background:#ff3b30;}
.red .title{color:#ff3b30;}

.smallbtn,.startbtn{
background:#e9e9ed;
color:#333;
padding:10px 0;
border-radius:10px;
border:none;
font-weight:bold;
text-align:center;
min-width:0;
}

.timeRow{
display:grid;
grid-template-columns:repeat(5,1fr) auto 92px;
gap:6px;
align-items:center;
margin-bottom:10px;
}

.secBtns{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
width:100%;
margin-bottom:10px;
}

.startBtns{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
width:100%;
margin-bottom:10px;
}

.smallbtn.active,.startbtn.active{background:#007aff;color:#fff;}
.red .smallbtn.active,.red .startbtn.active{background:#ff3b30;color:#fff;}

#toast{
position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
background:#333;color:#fff;padding:10px 16px;border-radius:20px;
opacity:0;transition:.3s;z-index:999;
}

/* =====【追加：疑似スプラッシュ画面】===== */
#splash{
position:fixed;
inset:0;
background:#f5f5f7;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
transition:opacity .4s;
}
#splash img{
width:120px;
height:120px;
border-radius:28px;
}
#splash div{
margin-top:16px;
font-weight:bold;
font-size:20px;
}
#splash.hide{
opacity:0;
pointer-events:none;
}

.resetBtn{
width:100%;
margin-top:10px;
padding:12px;
border-radius:12px;
border:none;
background:#999;
color:#fff;
font-weight:bold;
}

.resetBtn.danger{
background:#ff3b30;
}

</style>
</head>

<body>

<!-- =====【追加：疑似スプラッシュ画面】===== -->
<div id="splash">
  <img src="/wos-calc/PutyKenMini.png">
  <div>ぷてぃ研の連撃計算機</div>
</div>
<!-- =====【ここまで追加】===== -->

<h1>🐶ぷてぃ研の連撃計算🐶</h1>

<div class="tabs">
  <button class="tab active" onclick="switchTab('normal',this)">通常連撃</button>
  <button class="tab" onclick="switchTab('forty',this)">40秒起点</button>
  <button class="tab" onclick="switchTab('fortress',this)">砦・霜竜</button>
</div>

<div id="normal" class="mode active"></div>
<div id="forty" class="mode"></div>
<div id="fortress" class="mode"></div>
<div id="toast">コピーしたワン！</div>

<script>
function switchTab(id,btn){
  document.querySelectorAll(".mode").forEach(x=>x.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  btn.classList.add("active");
}

function pad(n){return String(n).padStart(2,"0")}
function showToast(){const t=document.getElementById("toast");t.style.opacity=1;setTimeout(()=>t.style.opacity=0,1500);}
function copyText(text,resultId){document.getElementById(resultId).textContent=text;navigator.clipboard.writeText(text);showToast();}
function setActive(btn,cls){btn.parentNode.querySelectorAll(cls).forEach(b=>b.classList.remove("active"));btn.classList.add("active");}
function setHidden(id,val,btn,cls){document.getElementById(id).value=val;setActive(btn,cls);}
function setSec(rowId,val,btn){document.getElementById("sec_"+rowId).value=val;setActive(btn,".smallbtn");}

function clearErrors(areaId){
  document.querySelectorAll("#"+areaId+" input").forEach(i=>i.classList.remove("error"));
}

function showErrors(errors){
  alert([...new Set(errors)].join("\n"));
}

function timeUI(prefix,id){
return `
<div>基準時間（例 21:00）</div>
<div class="timeRow">
<button class="smallbtn active" onclick="setHidden('${prefix}Hour${id}',21,this,'.smallbtn')">21</button>
<button class="smallbtn" onclick="setHidden('${prefix}Hour${id}',22,this,'.smallbtn')">22</button>
<button class="smallbtn" onclick="setHidden('${prefix}Hour${id}',23,this,'.smallbtn')">23</button>
<button class="smallbtn" onclick="setHidden('${prefix}Hour${id}',24,this,'.smallbtn')">24</button>
<button class="smallbtn" onclick="setHidden('${prefix}Hour${id}',1,this,'.smallbtn')">1</button>
<span>:</span>
<input id="${prefix}Min${id}" class="timeMin" placeholder="00〜59">
</div>
<input type="hidden" id="${prefix}Hour${id}" value="21">

<div>スタート秒</div>
<div class="startBtns">
<button class="startbtn active" onclick="setHidden('${prefix}Start${id}',0,this,'.startbtn')">00秒</button>
<button class="startbtn" onclick="setHidden('${prefix}Start${id}',15,this,'.startbtn')">15秒</button>
<button class="startbtn" onclick="setHidden('${prefix}Start${id}',30,this,'.startbtn')">30秒</button>
<button class="startbtn" onclick="setHidden('${prefix}Start${id}',45,this,'.startbtn')">45秒</button>
</div>
<input type="hidden" id="${prefix}Start${id}" value="0">
`;
}

/* 通常連撃 */
function normalTool(id,name,color){
return `
<div class="section ${color}" id="normalBox${id}">
<div class="title">${name}</div>
<div id="normalList${id}"></div>
<button class="btn add" onclick="addNormalRow(${id})">集結主を追加するワン</button>
${timeUI("normal",id)}
<div class="line wrap">
<button class="btn" onclick="calcNormal(${id},false)">計算&コピーするワン</button>
<button class="btn utcBtn" onclick="calcNormal(${id},true)">UTCでコピーするワン</button>
</div>
<div id="normalResult${id}" class="result">ここに計算結果が出るワン</div>
</div>`;
}

function addNormalRow(tool){
const rid="n_"+tool+"_"+Date.now()+Math.random();
const el=document.createElement("div");el.className="row";el.id=rid;
el.innerHTML=`
<div class="line">
<input class="name" placeholder="名前" id="name_${rid}">
<input class="sec" id="sec_${rid}" value="36">
<button class="delete" onclick="this.parentNode.parentNode.remove()">×</button>
</div>
<div class="secBtns">
<button class="smallbtn" onclick="setSec('${rid}',30,this)">30</button>
<button class="smallbtn" onclick="setSec('${rid}',32,this)">32</button>
<button class="smallbtn active" onclick="setSec('${rid}',36,this)">36</button>
<button class="smallbtn" onclick="setSec('${rid}',39,this)">39</button>
<button class="smallbtn" onclick="setSec('${rid}',43,this)">43</button>
</div>`;
document.getElementById("normalList"+tool).appendChild(el);
}

function calcNormal(tool,utc){
clearErrors("normalBox"+tool);

let minEl=document.getElementById("normalMin"+tool);
let h=parseInt(document.getElementById("normalHour"+tool).value);
let m=parseInt(minEl.value);
let s0=parseInt(document.getElementById("normalStart"+tool).value);
let errors=[];

if(minEl.value.trim()==="" || isNaN(m) || m<0 || m>59){
  errors.push("基準時間を入力してワン");
  minEl.classList.add("error");
}

let members=[];
document.querySelectorAll("#normalList"+tool+" .row").forEach(row=>{
const nameEl=document.getElementById("name_"+row.id);
const secEl=document.getElementById("sec_"+row.id);
const name=nameEl.value.trim();
const sec=secEl.value.trim();

if(name===""){errors.push("名前を入力してワン");nameEl.classList.add("error");}
if(sec==="" || isNaN(parseInt(sec))){errors.push("行軍を入力してワン");secEl.classList.add("error");}

members.push({name:name||"誰か",sec:parseInt(sec)});
});

if(errors.length){showErrors(errors);return;}

const maxSec=Math.max(...members.map(x=>x.sec));
let base=h*3600+m*60+s0;
members.forEach(x=>{x.time=base+(maxSec-x.sec);if(utc)x.time-=9*3600;while(x.time<0)x.time+=86400;});
members.sort((a,b)=>a.time-b.time);

let text=members.map(x=>{
let hh=Math.floor(x.time/3600)%24,mm=Math.floor((x.time%3600)/60),ss=x.time%60;
return `${x.name} → ${pad(hh)}:${pad(mm)}:${pad(ss)}${utc?" UTC":""}`;
}).join("\n");
copyText(text,"normalResult"+tool);
}

/* 40秒起点 */
function fortyTool(id,name,color){
return `
<div class="section ${color}" id="fortyBox${id}">
<div class="title">${name}</div>
<div id="fortyList${id}"></div>
<button class="btn add" onclick="addFortyRow(${id})">集結主を追加するワン</button>
${timeUI("forty",id)}
<div class="line wrap">
<button class="btn" onclick="calcForty(${id},false)">計算&コピーするワン</button>
<button class="btn utcBtn" onclick="calcForty(${id},true)">UTCでコピーするワン</button>
</div>
<div id="fortyResult${id}" class="result">ここに計算結果が出るワン</div>
</div>`;
}

function addFortyRow(tool){
const rid="f_"+tool+"_"+Date.now()+Math.random();
const el=document.createElement("div");el.className="row";el.id=rid;
el.innerHTML=`
<div class="line">
<input class="name" placeholder="名前" id="name_${rid}">
<input class="sec" id="sec_${rid}" value="36">
<button class="delete" onclick="this.parentNode.parentNode.remove()">×</button>
</div>
<div class="secBtns">
<button class="smallbtn" onclick="setSec('${rid}',30,this)">30</button>
<button class="smallbtn" onclick="setSec('${rid}',32,this)">32</button>
<button class="smallbtn active" onclick="setSec('${rid}',36,this)">36</button>
<button class="smallbtn" onclick="setSec('${rid}',39,this)">39</button>
<button class="smallbtn" onclick="setSec('${rid}',43,this)">43</button>
</div>`;
document.getElementById("fortyList"+tool).appendChild(el);
}

function calcForty(tool,utc){
clearErrors("fortyBox"+tool);

let minEl=document.getElementById("fortyMin"+tool);
let h=parseInt(document.getElementById("fortyHour"+tool).value);
let m=parseInt(minEl.value);
let start=parseInt(document.getElementById("fortyStart"+tool).value);
let errors=[];

if(minEl.value.trim()==="" || isNaN(m) || m<0 || m>59){
  errors.push("基準時間を入力してワン");
  minEl.classList.add("error");
}

let out=[];
document.querySelectorAll("#fortyList"+tool+" .row").forEach(row=>{
const nameEl=document.getElementById("name_"+row.id);
const secEl=document.getElementById("sec_"+row.id);
const name=nameEl.value.trim();
const sec=secEl.value.trim();

if(name===""){errors.push("名前を入力してワン");nameEl.classList.add("error");}
if(sec==="" || isNaN(parseInt(sec))){errors.push("行軍を入力してワン");secEl.classList.add("error");}

if(name!=="" && sec!=="" && !isNaN(parseInt(sec))){
  let t=h*3600+m*60+start+(40-parseInt(sec));
  while(t<0)t+=86400;
  if(utc)t-=9*3600;
  while(t<0)t+=86400;
  out.push({name,time:t});
}
});

if(errors.length){showErrors(errors);return;}

out.sort((a,b)=>a.time-b.time);

let text=out.map(x=>{
let hh=Math.floor(x.time/3600)%24,mm=Math.floor((x.time%3600)/60),ss=x.time%60;
return `${x.name} → ${pad(hh)}:${pad(mm)}:${pad(ss)}${utc?" UTC":""}`;
}).join("\n");

copyText(text,"fortyResult"+tool);
}

/* 砦・霜竜 */
function fortressBlock(id,name,color){
return `
<div class="section ${color}" id="fortressBox${id}">
<div class="title">${name}</div>
<div id="fortressList${id}"></div>
<button class="btn add" onclick="addFortressRow(${id})">集結主を追加するワン</button>

<div>基準時間（例 21:00）</div>
<div class="line">
<input id="fortressH${id}" class="timeMin" placeholder="時">
<span>:</span>
<input id="fortressM${id}" class="timeMin" placeholder="分">
</div>

<div>スタート秒</div>
<div class="startBtns">
<button class="startbtn active" onclick="setHidden('fortressStart${id}',0,this,'.startbtn')">00秒</button>
<button class="startbtn" onclick="setHidden('fortressStart${id}',15,this,'.startbtn')">15秒</button>
<button class="startbtn" onclick="setHidden('fortressStart${id}',30,this,'.startbtn')">30秒</button>
<button class="startbtn" onclick="setHidden('fortressStart${id}',45,this,'.startbtn')">45秒</button>
</div>
<input type="hidden" id="fortressStart${id}" value="0">

<div class="line wrap">
<button class="btn" onclick="calcFortress(${id},false)">計算&コピーするワン</button>
<button class="btn utcBtn" onclick="calcFortress(${id},true)">UTCでコピーするワン</button>
</div>
<div id="fortressResult${id}" class="result">ここに計算結果が出るワン</div>
</div>`;
}

function addFortressRow(tool){
const rid="r"+Date.now()+Math.random();
const el=document.createElement("div");el.className="line";el.id=rid;
el.innerHTML=`
<input class="name" placeholder="名前" id="name_${rid}">
<input class="sec" placeholder="秒" id="sec_${rid}">
<button class="delete" onclick="this.parentNode.remove()">×</button>`;
document.getElementById("fortressList"+tool).appendChild(el);
}

function calcFortress(tool,utc){
clearErrors("fortressBox"+tool);

const hEl=document.getElementById("fortressH"+tool);
const mEl=document.getElementById("fortressM"+tool);

let errors=[];
if(hEl.value.trim()===""||mEl.value.trim()==="" || isNaN(parseInt(hEl.value)) || isNaN(parseInt(mEl.value))){
  errors.push("基準時間を入力してワン");
  hEl.classList.add("error");
  mEl.classList.add("error");
}

let members=[];
document.querySelectorAll("#fortressList"+tool+" .line").forEach(row=>{
const nameEl=document.getElementById("name_"+row.id),secEl=document.getElementById("sec_"+row.id);
const name=nameEl.value.trim(),sec=secEl.value.trim();

if(name===""){errors.push("名前を入力してワン");nameEl.classList.add("error");}
if(sec==="" || isNaN(parseInt(sec))){errors.push("行軍を入力してワン");secEl.classList.add("error");}

members.push({name:name||"誰か",sec:parseInt(sec)});
});

if(errors.length){showErrors(errors);return;}

let h=parseInt(hEl.value),m=parseInt(mEl.value),start=parseInt(document.getElementById("fortressStart"+tool).value);
const maxSec=Math.max(...members.map(x=>x.sec));
let base=h*3600+m*60+start;

members.forEach(x=>{x.time=base+(maxSec-x.sec);if(utc)x.time-=9*3600;while(x.time<0)x.time+=86400;});
members.sort((a,b)=>a.time-b.time);

let text=members.map(x=>{
let hh=Math.floor(x.time/3600)%24,mm=Math.floor((x.time%3600)/60),ss=x.time%60;
return `${x.name} → ${pad(hh)}:${pad(mm)}:${pad(ss)}${utc?" UTC":""}`;
}).join("\n");

copyText(text,"fortressResult"+tool);
}

document.getElementById("normal").innerHTML=
normalTool(1,"メイン集結","blue")+normalTool(2,"ゴースト集結","red");
document.getElementById("forty").innerHTML=
fortyTool(1,"メイン集結","blue")+fortyTool(2,"ゴースト集結","red");
document.getElementById("fortress").innerHTML=
fortressBlock(1,"連撃①","blue")+fortressBlock(2,"連撃②","red");

/* 最初から2人分 */
addNormalRow(1);addNormalRow(1);
addNormalRow(2);addNormalRow(2);

addFortyRow(1);addFortyRow(1);
addFortyRow(2);addFortyRow(2);

addFortressRow(1);addFortressRow(1);
addFortressRow(2);addFortressRow(2);

// =====【追加：オフライン対応（Service Worker登録）】=====
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/wos-calc/service-worker.js");
  });
}

// =====【追加：疑似スプラッシュ画面を閉じる】=====
window.addEventListener("load",()=>{
  if(sessionStorage.getItem("skipSplash")==="1"){
    sessionStorage.removeItem("skipSplash");
    document.getElementById("splash")?.classList.add("hide");
    return;
  }

  setTimeout(()=>{
    document.getElementById("splash")?.classList.add("hide");
  },900);
});

// =====【名前だけ保存】=====
function saveInputs(){
  const data = {};
  document.querySelectorAll("input.name").forEach(input=>{
    if(input.id){
      data[input.id] = input.value;
    }
  });
  localStorage.setItem("putyCalcNames", JSON.stringify(data));
}

function loadInputs(){
  const saved = localStorage.getItem("putyCalcNames");
  if(!saved) return;

  const data = JSON.parse(saved);
  Object.keys(data).forEach(id=>{
    const input = document.getElementById(id);
    if(input){
      input.value = data[id];
    }
  });
}

// 入力されたら保存（名前だけ）
document.addEventListener("input", saveInputs);

// 起動時に復元
window.addEventListener("load", loadInputs);
// =====【ここまで】=====

function resetNames(){
  if(confirm("リセットするワン？")){
    localStorage.removeItem("putyCalcNames");
    sessionStorage.setItem("skipSplash","1");
    location.reload();
  }
}

</script>

<button class="resetBtn danger" onclick="resetNames()">リセットワン</button>

</body>
</html>
