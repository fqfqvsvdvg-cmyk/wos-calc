<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>砦・霜竜 連撃計算機</title>

<style>
body{font-family:-apple-system;background:#f5f5f7;margin:0;padding:16px;}
h1{text-align:center;font-size:22px;margin-bottom:16px;}

.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:16px;}
.title{font-weight:bold;margin-bottom:10px;}

.line{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}

input{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

/* ❗エラー時 */
.error{
border:2px solid #ff3b30 !important;
background:#fff0f0;
}

.name{flex:1;}
.sec{width:80px;text-align:center;}
.time{width:80px;text-align:center;}

.btn{
padding:12px;
border-radius:10px;
color:#fff;
border:none;
font-weight:bold;
text-align:center;
}

.utcBtn{background:#555;}

.result{
background:#f1f1f4;
padding:10px;
border-radius:10px;
white-space:pre-wrap;
}

.delete{color:red;}

.blue .btn{background:#007aff;}
.blue .title{color:#007aff;}

.red .btn{background:#ff3b30;}
.red .title{color:#ff3b30;}

.startbtn{
background:#e0e0e0;
color:#333;
padding:12px;
border-radius:10px;
border:none;
font-weight:bold;
min-width:70px;
text-align:center;
}

.startbtn.active{
background:#007aff;
color:#fff;
}

.red .startbtn.active{
background:#ff3b30;
}

#toast{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:#333;
color:#fff;
padding:10px 16px;
border-radius:20px;
opacity:0;
transition:.3s;
}
</style>
</head>

<body>

<h1>🐶砦・霜竜 連撃計算機🐶</h1>

<div id="app"></div>
<div id="toast">コピーしたワン！</div>

<script>
function createBlock(id,name,color){
return `
<div class="card ${color}">
<div class="title">${name}</div>

<div id="list${id}"></div>

<button class="btn" onclick="addRow(${id})">集結主を追加するワン</button>

<br>

<div>基準時間（例 21:00）</div>
<div class="line">
<input id="h${id}" class="time" placeholder="時">
:
<input id="m${id}" class="time" placeholder="分">
</div>

<div>スタート秒</div>
<div class="line">
<button class="startbtn active" onclick="setStart(${id},0,this)">00秒</button>
<button class="startbtn" onclick="setStart(${id},15,this)">15秒</button>
<button class="startbtn" onclick="setStart(${id},30,this)">30秒</button>
<button class="startbtn" onclick="setStart(${id},45,this)">45秒</button>
</div>
<input type="hidden" id="start${id}" value="0">

<div class="line">
<button class="btn" onclick="calc(${id},false)">計算&コピーするワン</button>
<button class="btn utcBtn" onclick="calc(${id},true)">UTCでコピーするワン</button>
</div>

<div id="result${id}" class="result">ここに結果</div>
</div>
`;
}

document.getElementById("app").innerHTML =
createBlock(1,"連撃①","blue") +
createBlock(2,"連撃②","red");

function addRow(id){
const el=document.createElement("div");
const rid=Date.now()+Math.random();

el.className="line";
el.id="r"+rid;

el.innerHTML=`
<input class="name" placeholder="名前" id="n${rid}">
<input class="sec" placeholder="秒" id="s${rid}">
<button class="delete" onclick="this.parentNode.remove()">✕</button>
`;

document.getElementById("list"+id).appendChild(el);
}

/* 初期2人 */
addRow(1);addRow(1);
addRow(2);addRow(2);

function setStart(id,val,btn){
document.getElementById("start"+id).value=val;
btn.parentNode.querySelectorAll(".startbtn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function pad(n){return String(n).padStart(2,'0')}

function showToast(){
const t=document.getElementById("toast");
t.style.opacity=1;
setTimeout(()=>t.style.opacity=0,1500);
}

function clearErrors(id){
document.querySelectorAll("#list"+id+" input").forEach(i=>i.classList.remove("error"));
document.getElementById("h"+id).classList.remove("error");
document.getElementById("m"+id).classList.remove("error");
}

function calc(id,isUTC){

clearErrors(id);

let h=document.getElementById("h"+id);
let m=document.getElementById("m"+id);
let start=parseInt(document.getElementById("start"+id).value);

let errors=[];

/* 基準時間チェック */
if(h.value.trim()==="" || m.value.trim()===""){
errors.push("基準時間を入力してワン");
h.classList.add("error");
m.classList.add("error");
}

/* メンバー */
let members=[];

document.querySelectorAll("#list"+id+" .line").forEach(row=>{
const rid=row.id.replace("r","");
const nameEl=document.getElementById("n"+rid);
const secEl=document.getElementById("s"+rid);

const name=nameEl.value.trim();
const sec=secEl.value.trim();

if(name===""){
errors.push("名前を入力してワン");
nameEl.classList.add("error");
}

if(sec===""){
errors.push("行軍を入力してワン");
secEl.classList.add("error");
}

members.push({
name:name||"誰か",
sec:parseInt(sec)
});
});

if(errors.length){
alert([...new Set(errors)].join("\n"));
return;
}

let hh=parseInt(h.value);
let mm=parseInt(m.value);

const maxSec=Math.max(...members.map(x=>x.sec));
let base=hh*3600+mm*60+start;

/* 計算 */
members.forEach(x=>{
x.time=base+(maxSec-x.sec);
if(isUTC){x.time-=9*3600;}
while(x.time<0)x.time+=86400;
});

/* ⭐ 並び替え（早い順） */
members.sort((a,b)=>a.time-b.time);

let out=members.map(x=>{
let h=Math.floor(x.time/3600)%24;
let m=Math.floor((x.time%3600)/60);
let s=x.time%60;
return `${x.name} → ${pad(h)}:${pad(m)}:${pad(s)}${isUTC?" UTC":""}`;
});

let text=out.join("\n");

document.getElementById("result"+id).textContent=text;
navigator.clipboard.writeText(text);
showToast();
}
</script>

</body>
</html>
