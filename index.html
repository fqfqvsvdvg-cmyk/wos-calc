<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>砦・霜竜 連撃計算機</title>

<style>
body{font-family:-apple-system;background:#f5f5f7;margin:0;padding:16px;}
h1{text-align:center;font-size:22px;margin-bottom:16px;}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:16px;}
.title{font-weight:bold;margin-bottom:10px;}
.line{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
input{padding:10px;border-radius:10px;border:1px solid #ccc;}
.name{flex:1;}
.sec{width:80px;text-align:center;}
.time{width:80px;text-align:center;}
.btn{padding:12px;border-radius:10px;background:#007aff;color:#fff;text-align:center;margin-top:10px;}
.result{background:#f1f1f4;padding:10px;border-radius:10px;white-space:pre-wrap;}
.delete{color:red;}
</style>
</head>

<body>

<h1>🐶砦・霜竜 連撃計算機🐶</h1>

<div id="app"></div>

<script>
function createBlock(id,name){
return `
<div class="card">
<div class="title">${name}</div>

<div id="list${id}"></div>

<div class="btn" onclick="addRow(${id})">追加</div>

<br>
<div>着弾時間</div>
<div class="line">
<input id="h${id}" class="time" placeholder="時">
:
<input id="m${id}" class="time" placeholder="分">
</div>

<div class="btn" onclick="calc(${id})">計算&コピー</div>

<div id="result${id}" class="result">ここに結果</div>
</div>
`;
}

document.getElementById("app").innerHTML =
createBlock(1,"連撃①") +
createBlock(2,"連撃②");

function addRow(id){
const el=document.createElement("div");
const rid=Date.now()+Math.random();

el.className="line";
el.id="r"+rid;

el.innerHTML=`
<input class="name" placeholder="名前" id="n${rid}">
<input class="sec" placeholder="秒" id="s${rid}">
<button class="delete" onclick="this.parentNode.remove()">✕</button>
`;

document.getElementById("list"+id).appendChild(el);
}

function pad(n){return String(n).padStart(2,'0')}

function calc(id){
let h=parseInt(document.getElementById("h"+id).value);
let m=parseInt(document.getElementById("m"+id).value);

if(isNaN(h)||isNaN(m)){
alert("時間を入力してワン");
return;
}

let members=[];

document.querySelectorAll("#list"+id+" .line").forEach(row=>{
const rid=row.id.replace("r","");
const name=document.getElementById("n"+rid).value||"誰か";
const sec=parseInt(document.getElementById("s"+rid).value);
if(!isNaN(sec)) members.push({name,sec});
});

if(!members.length){
document.getElementById("result"+id).textContent="メンバー入力してワン";
return;
}

const maxSec=Math.max(...members.map(x=>x.sec));
let base=h*3600+m*60;

let out=members.map(x=>{
let t=base+(maxSec-x.sec);
let hh=Math.floor(t/3600)%24;
let mm=Math.floor((t%3600)/60);
let ss=t%60;
return `${x.name} → ${pad(hh)}:${pad(mm)}:${pad(ss)}`;
});

let text=out.join("\n");

document.getElementById("result"+id).textContent=text;
navigator.clipboard.writeText(text);
}
</script>

</body>
</html>
