<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ぷてぃ研の連撃計算機</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007aff">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/fqfqvsvdvg-cmyk/wos-calc/refs/heads/main/E41A3360-3F58-47D4-A317-EA0B585DA76A.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{font-family:-apple-system;background:#f5f5f7;margin:0;padding:16px;}
h1{text-align:center;font-size:22px;margin-bottom:16px;}

.tabs{display:flex;gap:6px;margin-bottom:16px;}
.tab{flex:1;padding:12px;border:none;border-radius:12px;background:#e9e9ed;font-weight:bold;}
.tab.active{background:#007aff;color:#fff;}

.mode{display:none;}
.mode.active{display:block;}

.section{background:#fff;border-radius:14px;padding:14px;margin-bottom:16px;}

.title{font-weight:bold;margin-bottom:10px;font-size:20px;}

.line{display:flex;gap:8px;margin-bottom:8px;}
.wrap{flex-wrap:wrap;}

input{padding:10px;border-radius:10px;border:1px solid #ccc;}
.name{flex:1;}
.sec{width:80px;text-align:center;}

.btn{padding:12px;border-radius:10px;color:#fff;border:none;font-weight:bold;}
.blue .btn{background:#007aff;}
.red .btn{background:#ff3b30;}

.utcBtn{background:#555!important;}

.smallbtn,.startbtn{
background:#e9e9ed;
padding:10px;
border-radius:10px;
border:none;
font-weight:bold;
}

.smallbtn.active,.startbtn.active{
background:#007aff;color:#fff;
}

.red .smallbtn.active,.red .startbtn.active{
background:#ff3b30;
}

.timeRow{
display:grid;
grid-template-columns:repeat(5,1fr) auto 80px;
gap:6px;
}

.secBtns{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
margin-bottom:10px;
}

.startBtns{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
margin-bottom:10px;
}

.result{
background:#f1f1f4;
padding:10px;
border-radius:10px;
white-space:pre-wrap;
font-weight:bold;
}

#toast{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:#333;
color:#fff;
padding:10px 16px;
border-radius:20px;
opacity:0;
transition:.3s;
}
</style>
</head>

<body>

<h1>🐶ぷてぃ研の連撃計算機🐶</h1>

<div class="tabs">
<button class="tab active" onclick="switchTab('normal',this)">通常連撃</button>
<button class="tab" onclick="switchTab('forty',this)">40秒起点</button>
<button class="tab" onclick="switchTab('fortress',this)">砦・霜竜</button>
</div>

<div id="normal" class="mode active"></div>
<div id="forty" class="mode"></div>
<div id="fortress" class="mode"></div>

<div id="toast">コピーしたワン！</div>

<script>

function switchTab(id,btn){
document.querySelectorAll(".mode").forEach(x=>x.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

function pad(n){return String(n).padStart(2,"0")}
function toast(){const t=document.getElementById("toast");t.style.opacity=1;setTimeout(()=>t.style.opacity=0,1500);}

function timeUI(prefix,id){
return `
<div>基準時間（例 21:00）</div>
<div class="timeRow">
<button class="smallbtn active" onclick="set('${prefix}H${id}',21,this)">21</button>
<button class="smallbtn" onclick="set('${prefix}H${id}',22,this)">22</button>
<button class="smallbtn" onclick="set('${prefix}H${id}',23,this)">23</button>
<button class="smallbtn" onclick="set('${prefix}H${id}',24,this)">24</button>
<button class="smallbtn" onclick="set('${prefix}H${id}',1,this)">1</button>
<span>:</span>
<input id="${prefix}M${id}" placeholder="00">
</div>
<input type="hidden" id="${prefix}H${id}" value="21">

<div>スタート秒</div>
<div class="startBtns">
<button class="startbtn active" onclick="set('${prefix}S${id}',0,this)">00秒</button>
<button class="startbtn" onclick="set('${prefix}S${id}',15,this)">15秒</button>
<button class="startbtn" onclick="set('${prefix}S${id}',30,this)">30秒</button>
<button class="startbtn" onclick="set('${prefix}S${id}',45,this)">45秒</button>
</div>
<input type="hidden" id="${prefix}S${id}" value="0">
`;
}

function set(id,val,btn){
document.getElementById(id).value=val;
btn.parentNode.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function addRow(list){
const id="r"+Date.now();
const el=document.createElement("div");
el.innerHTML=`
<div class="line">
<input class="name" placeholder="名前">
<input class="sec" value="36">
<button onclick="this.parentNode.parentNode.remove()">×</button>
</div>
<div class="secBtns">
<button onclick="setSec(this,30)">30</button>
<button onclick="setSec(this,32)">32</button>
<button class="active" onclick="setSec(this,36)">36</button>
<button onclick="setSec(this,39)">39</button>
<button onclick="setSec(this,43)">43</button>
</div>`;
list.appendChild(el);
}

function setSec(btn,val){
btn.closest("div").previousElementSibling.querySelector(".sec").value=val;
btn.parentNode.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function build(id,color){
return `
<div class="section ${color}">
<div class="title">メイン集結</div>
<div id="${id}list"></div>
<button class="btn" onclick="addRow(document.getElementById('${id}list'))">集結主を追加するワン</button>
${timeUI(id,1)}
<button class="btn" onclick="calc('${id}',false)">計算&コピーするワン</button>
<button class="btn utcBtn" onclick="calc('${id}',true)">UTCでコピーするワン</button>
<div id="${id}res" class="result">ここに計算結果が出るワン</div>
</div>`;
}

function calc(id,utc){
let h=parseInt(document.getElementById(id+"H1").value);
let m=parseInt(document.getElementById(id+"M1").value||0);
let s=parseInt(document.getElementById(id+"S1").value);

let list=document.querySelectorAll("#"+id+"list > div:nth-child(odd)");

let arr=[];
list.forEach(row=>{
let name=row.querySelector(".name").value||"誰か";
let sec=parseInt(row.querySelector(".sec").value);
arr.push({name,sec});
});

let max=Math.max(...arr.map(x=>x.sec));
let base=h*3600+m*60+s;

arr.forEach(x=>{
x.time=base+(max-x.sec);
if(utc)x.time-=9*3600;
while(x.time<0)x.time+=86400;
});

arr.sort((a,b)=>a.time-b.time);

let text=arr.map(x=>{
let hh=Math.floor(x.time/3600)%24;
let mm=Math.floor((x.time%3600)/60);
let ss=x.time%60;
return `${x.name} → ${pad(hh)}:${pad(mm)}:${pad(ss)}${utc?" UTC":""}`;
}).join("\n");

document.getElementById(id+"res").textContent=text;
navigator.clipboard.writeText(text);
toast();
}

/* 初期2人 */
["normal","forty","fortress"].forEach(id=>{
document.getElementById(id).innerHTML=build(id,"blue");
addRow(document.getElementById(id+"list"));
addRow(document.getElementById(id+"list"));
});

</script>
</body>
</html>
