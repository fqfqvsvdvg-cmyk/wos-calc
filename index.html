<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>集結時間計算機</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont;
  background:#f5f5f7;
  margin:0;
  padding:16px;
}

h1{
  text-align:center;
  font-size:22px;
  margin-bottom:16px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
}

.row{
  display:flex;
  gap:8px;
  margin-bottom:8px;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#007aff;
  color:#fff;
  font-weight:bold;
}

.add{
  background:#e9e9ed;
  color:#007aff;
}

.result{
  background:#f1f1f4;
  padding:12px;
  border-radius:10px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>集結時間計算機</h1>

<div class="card" id="list"></div>

<button class="add" onclick="addRow()">＋ リーダー追加</button>

<div class="card">
  <div>集結時間</div>
  <input id="time" value="8:12">
</div>

<div class="card">
  <button onclick="calc()">計算＆コピー</button>
</div>

<div class="card">
  <div class="result" id="result">ここに結果</div>
</div>

<script>
let rows=[];

function addRow(){
  const id=Date.now();
  rows.push(id);

  const el=document.createElement("div");
  el.className="row";
  el.id=id;

  el.innerHTML=`
    <input placeholder="名前" id="n${id}">
    <input placeholder="秒" id="s${id}" type="number">
  `;

  document.getElementById("list").appendChild(el);
}

function pad(n){return String(n).padStart(2,'0')}

function calc(){
  const t=document.getElementById("time").value.split(":");
  let h=parseInt(t[0]);
  let m=parseInt(t[1]);

  let out=[];

  rows.forEach(id=>{
    let name=document.getElementById("n"+id).value || "誰か";
    let sec=parseInt(document.getElementById("s"+id).value);

    if(isNaN(sec)) return;

    let s=40-sec;
    let hh=h, mm=m;

    if(s<0){ s+=60; mm--; }
    if(mm<0){ mm+=60; hh--; }
    if(hh<0) hh+=24;

    out.push(`${name} ${pad(hh)}:${pad(mm)}:${pad(s)}`);
  });

  let text=out.join("\n");

  document.getElementById("result").textContent=text;

  navigator.clipboard.writeText(text);
}
</script>

</body>
</html>
