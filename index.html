<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🐶40秒起点 集結時間計算機🐶</title>

<style>
body{font-family:-apple-system,BlinkMacSystemFont;background:#f5f5f7;margin:0;padding:16px;}
h1{text-align:center;font-size:22px;margin-bottom:16px;}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:14px;}
.row{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.line{display:flex;gap:6px;align-items:center;}
input{padding:10px;border-radius:10px;border:1px solid #ddd;}
.name{flex:1;}
.sec{width:60px;text-align:center;}
.btn{padding:6px 8px;border-radius:8px;border:none;background:#e9e9ed;flex:1;color:#007aff;}
.btn.active{background:#007aff;color:#fff;font-weight:bold;}
.delete{color:#ff3b30;font-weight:bold;width:40px;flex:0 0 40px;}
button.main{width:100%;padding:12px;border-radius:12px;border:none;background:#007aff;color:#fff;font-weight:bold;}
.add{background:#e9e9ed;color:#007aff;width:100%;padding:12px;border-radius:12px;border:none;font-weight:bold;}
.result{background:#f1f1f4;padding:12px;border-radius:10px;white-space:pre-wrap;}
.note{font-size:13px;color:#777;margin-top:6px;}
</style>
</head>

<body>

<h1>🐶40秒起点 集結時間計算機🐶</h1>

<div class="card" id="list"></div>

<button class="add" onclick="addRow()">＋ リーダー追加</button>

<div class="card">
  集結時間
  <input id="time" placeholder="例 21:00">
  <div class="note">※40秒起点で送信時間を出します</div>
</div>

<div class="card">
  <button class="main" onclick="calc()">計算＆コピー</button>
</div>

<div class="card">
  <div class="result" id="result">ここに結果が出ます</div>
</div>

<script>
let rows=[];

function addRow(){
  const id=Date.now();
  rows.push(id);

  const el=document.createElement("div");
  el.className="row";
  el.id=id;

  el.innerHTML=`
    <div class="line">
      <input class="name" placeholder="名前" id="n${id}">
      <input class="sec" id="s${id}" value="36">
      <button class="btn delete" onclick="removeRow(${id})">✕</button>
    </div>

    <div class="line">
      <button class="btn secbtn" onclick="setSec(${id},30,this)">30</button>
      <button class="btn secbtn" onclick="setSec(${id},32,this)">32</button>
      <button class="btn secbtn active" onclick="setSec(${id},36,this)">36</button>
      <button class="btn secbtn" onclick="setSec(${id},39,this)">39</button>
      <button class="btn secbtn" onclick="setSec(${id},43,this)">43</button>
    </div>
  `;

  document.getElementById("list").appendChild(el);
}

function setSec(id,val,btn){
  document.getElementById("s"+id).value=val;

  const row=document.getElementById(id);
  row.querySelectorAll(".secbtn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function removeRow(id){
  document.getElementById(id).remove();
  rows = rows.filter(x => x !== id);
}

function pad(n){return String(n).padStart(2,'0')}

function calc(){
  const timeInput=document.getElementById("time").value.trim();

  if(!timeInput){
    alert("集結時間を入力してワン");
    return;
  }

  const t=timeInput.split(":");
  let h=parseInt(t[0]);
  let m=parseInt(t[1]);

  if(isNaN(h) || isNaN(m)){
    alert("集結時間は 21:00 の形式で入力してください");
    return;
  }

  let out=[];

  rows.forEach(id=>{
    const rowEl=document.getElementById(id);
    if(!rowEl) return;

    let name=document.getElementById("n"+id).value || "誰か";
    let sec=parseInt(document.getElementById("s"+id).value);

    if(isNaN(sec)) return;

    let s=40-sec;
    let hh=h, mm=m;

    if(s<0){ s+=60; mm--; }
    if(mm<0){ mm+=60; hh--; }
    if(hh<0) hh+=24;

    let total = hh*3600 + mm*60 + s;

    out.push({
      text:`${name} → ${pad(hh)}:${pad(mm)}:${pad(s)}`,
      time: total
    });
  });

  out.sort((a,b)=>a.time-b.time);

  let text=out.map(x=>x.text).join("\n");

  document.getElementById("result").textContent=text || "リーダーを追加してください";
  navigator.clipboard.writeText(text);
}

addRow();
</script>

</body>
</html>
