<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>40秒起点 集結時間計算機</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont;
  background:#f5f5f7;
  margin:0;
  padding:16px;
}

h1{
  text-align:center;
  font-size:22px;
  margin-bottom:16px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
}

.row{
  display:flex;
  gap:6px;
  align-items:center;
  margin-bottom:10px;
}

input{
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

.name{flex:1;}
.sec{width:60px;text-align:center;}

.btn{
  padding:6px 8px;
  border-radius:8px;
  border:none;
  background:#e9e9ed;
}

.delete{
  color:#ff3b30;
  font-weight:bold;
}

button.main{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#007aff;
  color:#fff;
  font-weight:bold;
}

.add{
  background:#e9e9ed;
  color:#007aff;
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  font-weight:bold;
}

.result{
  background:#f1f1f4;
  padding:12px;
  border-radius:10px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>40秒起点 集結時間計算機</h1>

<div class="card" id="list"></div>

<button class="add" onclick="addRow()">＋ リーダー追加</button>

<div class="card">
  集結時間
  <input id="time" value="8:12">
</div>

<div class="card">
  <button class="main" onclick="calc()">計算＆コピー</button>
</div>

<div class="card">
  <div class="result" id="result">ここに結果</div>
</div>

<script>
let rows=[];

function addRow(){
  const id=Date.now();
  rows.push(id);

  const el=document.createElement("div");
  el.className="row";
  el.id=id;

  el.innerHTML=`
    <input class="name" placeholder="名前" id="n${id}">
    <input class="sec" id="s${id}" value="36">

    <button class="btn" onclick="setSec(${id},30)">30</button>
    <button class="btn" onclick="setSec(${id},32)">32</button>
    <button class="btn" onclick="setSec(${id},39)">39</button>
    <button class="btn" onclick="setSec(${id},43)">43</button>

    <button class="btn delete" onclick="removeRow(${id})">✕</button>
  `;

  document.getElementById("list").appendChild(el);
}

function setSec(id,val){
  document.getElementById("s"+id).value=val;
}

function removeRow(id){
  document.getElementById(id).remove();
}

function pad(n){return String(n).padStart(2,'0')}

function calc(){
  const t=document.getElementById("time").value.split(":");
  let h=parseInt(t[0]);
  let m=parseInt(t[1]);

  let out=[];

  rows.forEach(id=>{
    let name=document.getElementById("n"+id).value || "誰か";
    let sec=parseInt(document.getElementById("s"+id).value);

    if(isNaN(sec)) return;

    let s=40-sec;
    let hh=h, mm=m;

    if(s<0){ s+=60; mm--; }
    if(mm<0){ mm+=60; hh--; }
    if(hh<0) hh+=24;

    let totalSec = hh*3600 + mm*60 + s;

    out.push({
      text:`${name} → ${pad(hh)}:${pad(mm)}:${pad(s)}`,
      time: totalSec
    });
  });

  // ★ここがソート
  out.sort((a,b)=>a.time-b.time);

  let text=out.map(x=>x.text).join("\n");

  document.getElementById("result").textContent=text;
  navigator.clipboard.writeText(text);
}
</script>

</body>
</html>
