<style>
.row{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:10px;
}

.line{
  display:flex;
  gap:6px;
  align-items:center;
}

.sec{width:60px;text-align:center;}

.btn{
  padding:6px 8px;
  border-radius:8px;
  border:none;
  background:#e9e9ed;
  flex:1;
}

.delete{
  color:#ff3b30;
  font-weight:bold;
  width:40px;
}
</style>

<script>
function addRow(){
  const id=Date.now();
  rows.push(id);

  const el=document.createElement("div");
  el.className="row";
  el.id=id;

  el.innerHTML=`
    <div class="line">
      <input class="name" placeholder="名前" id="n${id}">
      <input class="sec" id="s${id}" value="36">
      <button class="btn delete" onclick="removeRow(${id})">✕</button>
    </div>

    <div class="line">
      <button class="btn" onclick="setSec(${id},30)">30</button>
      <button class="btn" onclick="setSec(${id},32)">32</button>
      <button class="btn" onclick="setSec(${id},36)">36</button>
      <button class="btn" onclick="setSec(${id},39)">39</button>
      <button class="btn" onclick="setSec(${id},43)">43</button>
    </div>
  `;

  document.getElementById("list").appendChild(el);
}
</script>
