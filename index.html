function switchTab(id,btn){
document.querySelectorAll(".mode").forEach(x=>x.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
btn.classList.add("active");
}

function pad(n){return String(n).padStart(2,"0")}
function showToast(){let t=document.getElementById("toast");t.style.opacity=1;setTimeout(()=>t.style.opacity=0,1500);}
function copyText(text,id){document.getElementById(id).textContent=text;navigator.clipboard.writeText(text);showToast();}
function clearErrors(id){document.querySelectorAll("#"+id+" input").forEach(i=>i.classList.remove("error"));}

function showErrors(errors){alert([...new Set(errors)].join("\n"));}
